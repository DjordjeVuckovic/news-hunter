schema_version: 1
id: news_semantic_v1
name: "News Semantic Search Benchmark v1"
description: "Concept-level queries that require semantic understanding beyond keyword overlap"
version: "1.0.0"

corpus:
  name: news_hunter_articles
  source: "postgres://localhost:54320/news_db (articles)"

# NOTE: Vector queries use pre-computed embeddings. The {{embedding}} placeholder
# must be replaced with the actual float array before execution.
# Embeddings are produced with the Qwen3-Embedding-0.6B model (1024-dim).
# Each query has a corresponding embedding stored in trec/query_embeddings.json.
#
# Document vectors live in the article_embeddings table (VECTOR(1024)), keyed by
# article_id — the same schema the news-hunter API uses for semantic search.
#
# Engine-specific details:
#   pgvector-cosine: uses <=> (cosine distance) on article_embeddings.embedding
#   pgvector-l2:     uses <-> (L2 / Euclidean distance) on article_embeddings.embedding
#   elasticsearch:   uses knn with cosine similarity on the dense_vector field
#
# Prerequisites — apply migrations (make migrate-up-all):
#   - article_embeddings (VECTOR(1024)) with an HNSW cosine index
#     (db/migrations/004_create_embeddings_table.up.sql)

templates:
  - id: pgvector_cosine
    query: |
      SELECT article_id AS id FROM article_embeddings
      WHERE embedding IS NOT NULL
      ORDER BY embedding <=> '{{embedding}}'::vector
      LIMIT {{limit}}

  - id: pgvector_l2
    query: |
      SELECT article_id AS id FROM article_embeddings
      WHERE embedding IS NOT NULL
      ORDER BY embedding <-> '{{embedding}}'::vector
      LIMIT {{limit}}

queries:
  # Semantic queries test conceptual understanding: the relevant documents may
  # not share exact keywords with the query text.

  - id: sem-economic-crisis-consequences
    description: "Articles about economic downturns, recessions, job losses — broader than 'recession'"
    engines:
      pgvector-cosine:
        template: pgvector_cosine
        params: { embedding: "{{precomputed}}", limit: 50 }
      pgvector-l2:
        template: pgvector_l2
        params: { embedding: "{{precomputed}}", limit: 50 }
      elasticsearch: |
        {
          "knn": {
            "field": "embedding",
            "query_vector": {{precomputed}},
            "k": 50,
            "num_candidates": 200
          }
        }

