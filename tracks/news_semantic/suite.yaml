schema_version: 1
id: news_semantic_v1
name: "News Semantic Search Benchmark v1"
description: "Concept-level queries that require semantic understanding beyond keyword overlap"
version: "1.0.0"

corpus:
  name: news_hunter_articles
  source: "postgres://localhost:54320/news_db (articles)"

# Query embeddings ({{embedding}} placeholder) use Qwen3-Embedding-0.6B (1024-dim).
# Document vectors live in article_embeddings (VECTOR(1024)); requires migrations (make migrate-up-all).

templates:
  - id: pgvector_cosine
    query: |
      SELECT article_id AS id FROM article_embeddings
      WHERE embedding IS NOT NULL
      ORDER BY embedding <=> '{{embedding}}'::vector
      LIMIT {{limit}}

  - id: pgvector_l2
    query: |
      SELECT article_id AS id FROM article_embeddings
      WHERE embedding IS NOT NULL
      ORDER BY embedding <-> '{{embedding}}'::vector
      LIMIT {{limit}}

queries:
  # Semantic queries test conceptual understanding: the relevant documents may
  # not share exact keywords with the query text.

  - id: sem-economic-crisis-consequences
    description: "Articles about economic downturns, recessions, job losses — broader than 'recession'"
    engines:
      pgvector-cosine:
        template: pgvector_cosine
        params: { embedding: "{{precomputed}}", limit: 50 }
      pgvector-l2:
        template: pgvector_l2
        params: { embedding: "{{precomputed}}", limit: 50 }
      elasticsearch: |
        {
          "knn": {
            "field": "embedding",
            "query_vector": {{precomputed}},
            "k": 50,
            "num_candidates": 200
          }
        }

