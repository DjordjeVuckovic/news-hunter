schema_version: 1
id: fts_quality_v1
name: "FTS Quality Benchmark v1"
description: "Starter suite with ~10 queries across search paradigms for end-to-end verification"
version: "1.0.0"

corpus:
  name: news_hunter_articles
  source: "postgres://localhost:54320/news_db (articles)"

templates:
  - id: pg_fts_multi_field
    query: |
      SELECT id FROM articles
      WHERE to_tsvector('english', title || ' ' || coalesce(description,'') || ' ' || coalesce(content,''))
            @@ plainto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(
        to_tsvector('english', title || ' ' || coalesce(description,'') || ' ' || coalesce(content,'')),
        plainto_tsquery('english', '{{terms}}')
      ) DESC
      LIMIT {{limit}}

  - id: pg_fts_single_field
    query: |
      SELECT id FROM articles
      WHERE to_tsvector('english', {{field}}) @@ {{tsquery_fn}}('english', '{{terms}}')
      ORDER BY ts_rank(to_tsvector('english', {{field}}), {{tsquery_fn}}('english', '{{terms}}')) DESC
      LIMIT {{limit}}

  - id: pg_fts_phrase
    query: |
      SELECT id FROM articles
      WHERE to_tsvector('english', {{fields}})
            @@ phraseto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(
        to_tsvector('english', {{fields}}),
        phraseto_tsquery('english', '{{terms}}')
      ) DESC
      LIMIT {{limit}}

  - id: pg_fts_boolean
    query: |
      SELECT id FROM articles
      WHERE to_tsvector('english', {{fields}})
            @@ to_tsquery('english', '{{tsquery_expr}}')
      ORDER BY ts_rank(
        to_tsvector('english', {{fields}}),
        to_tsquery('english', '{{tsquery_expr}}')
      ) DESC
      LIMIT {{limit}}

  - id: pg_fts_weighted
    query: |
      SELECT id FROM articles
      WHERE to_tsvector('english', title || ' ' || coalesce(description,'') || ' ' || coalesce(content,''))
            @@ plainto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(
        setweight(to_tsvector('english', title), 'A') ||
        setweight(to_tsvector('english', coalesce(description,'')), 'B') ||
        setweight(to_tsvector('english', coalesce(content,'')), 'C'),
        plainto_tsquery('english', '{{terms}}')
      ) DESC
      LIMIT {{limit}}

  # --- ParadeDB BM25 templates (pdb.* operators) ---
  # pdb_multi_field: single Tantivy scan across all indexed fields via key_field
  - id: pdb_multi_field
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.parse('{{terms}}')
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

  # pdb_multi_field_boosted: per-field boost, single BM25 scan
  - id: pdb_multi_field_boosted
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.boolean(
        should => ARRAY[
          paradedb.boost(3.0, paradedb.match('title', '{{terms}}')),
          paradedb.boost(2.0, paradedb.match('description', '{{terms}}')),
          paradedb.match('content', '{{terms}}')
        ]
      )
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

  - id: pdb_single_field
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.match('{{field}}', '{{terms}}')
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

  # pdb_phrase: Lucene quoted phrase syntax, searches all indexed fields
  - id: pdb_phrase
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.parse('"{{terms}}"')
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

  - id: pdb_phrase_slop
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.parse('"{{terms}}"~{{slop}}')
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

  # --- Pre-computed search_vector (GIN-indexed) templates ---
  - id: pg_idx_multi_field
    query: |
      SELECT id FROM articles
      WHERE search_vector @@ plainto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(search_vector, plainto_tsquery('english', '{{terms}}')) DESC
      LIMIT {{limit}}

  - id: pg_idx_phrase
    query: |
      SELECT id FROM articles
      WHERE search_vector @@ phraseto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(search_vector, phraseto_tsquery('english', '{{terms}}')) DESC
      LIMIT {{limit}}

  - id: pg_idx_boolean
    query: |
      SELECT id FROM articles
      WHERE search_vector @@ to_tsquery('english', '{{tsquery_expr}}')
      ORDER BY ts_rank(search_vector, to_tsquery('english', '{{tsquery_expr}}')) DESC
      LIMIT {{limit}}

  - id: pg_idx_weighted
    query: |
      SELECT id FROM articles
      WHERE search_vector @@ plainto_tsquery('english', '{{terms}}')
      ORDER BY ts_rank(search_vector, plainto_tsquery('english', '{{terms}}')) DESC
      LIMIT {{limit}}

queries:
  # --- Simple keyword search ---
  - id: qs-climate
    description: "Simple keyword search for climate change articles"
    engines:
      pg-seq:
        template: pg_fts_multi_field
        params: { terms: "climate change", limit: 100 }
      pg-gin:
        template: pg_idx_multi_field
        params: { terms: "climate change", limit: 100 }
      paradedb:
        template: pdb_multi_field
        params: { terms: "climate change", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "climate change",
              "fields": ["title^3", "description^2", "content"]
            }
          },
          "size": 100
        }
      api: |
        {
          "method": "GET",
          "path": "/v1/articles/search",
          "params": {
            "query": "climate change",
            "size": "100"
          }
        }

  - id: qs-election
    description: "Simple keyword search for election coverage"
    engines:
      pg-seq:
        template: pg_fts_multi_field
        params: { terms: "presidential election results", limit: 100 }
      pg-gin:
        template: pg_idx_multi_field
        params: { terms: "presidential election results", limit: 100 }
      paradedb:
        template: pdb_multi_field
        params: { terms: "presidential election results", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "presidential election results",
              "fields": ["title^3", "description^2", "content"]
            }
          },
          "size": 100
        }

  # --- Single-field match ---
  - id: match-title-economy
    description: "Title-only search for economy articles"
    engines:
      pg-seq:
        template: pg_fts_single_field
        params: { field: "title", tsquery_fn: "plainto_tsquery", terms: "economy recession", limit: 100 }
      pg-gin:
        template: pg_idx_multi_field
        params: { terms: "economy recession", limit: 100 }
      paradedb:
        template: pdb_single_field
        params: { field: "title", terms: "economy recession", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "match": {
              "title": {
                "query": "economy recession",
                "operator": "or"
              }
            }
          },
          "size": 100
        }
      api: |
        {
          "method": "POST",
          "path": "/v1/articles/_search",
          "body": "{\"size\":100,\"query\":{\"match\":{\"field\":\"title\",\"query\":\"economy recession\",\"operator\":\"or\"}}}"
        }

  - id: match-content-ai
    description: "Phrase search for 'artificial intelligence' across all fields"
    engines:
      pg-seq:
        template: pg_fts_phrase
        params: { fields: "title || ' ' || coalesce(description,'') || ' ' || coalesce(content,'')", terms: "artificial intelligence", limit: 100 }
      pg-gin:
        template: pg_idx_phrase
        params: { terms: "artificial intelligence", limit: 100 }
      paradedb:
        template: pdb_phrase
        params: { terms: "artificial intelligence", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "artificial intelligence",
              "type": "phrase",
              "fields": ["title", "description", "content"]
            }
          },
          "size": 100
        }

  # --- Phrase matching ---
  - id: phrase-global-warming
    description: "Exact phrase search for 'global warming'"
    engines:
      pg-seq:
        template: pg_fts_phrase
        params: { fields: "title || ' ' || coalesce(content,'')", terms: "global warming", limit: 100 }
      pg-gin:
        template: pg_idx_phrase
        params: { terms: "global warming", limit: 100 }
      paradedb:
        template: pdb_phrase
        params: { terms: "global warming", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "global warming",
              "type": "phrase",
              "fields": ["title", "content"]
            }
          },
          "size": 100
        }

  - id: phrase-trade-war-slop
    description: "Phrase search with slop for 'trade war'"
    engines:
      pg-seq:
        template: pg_fts_phrase
        params: { fields: "title || ' ' || coalesce(description,'')", terms: "trade war", limit: 100 }
      pg-gin:
        template: pg_idx_phrase
        params: { terms: "trade war", limit: 100 }
      paradedb:
        template: pdb_phrase_slop
        params: { terms: "trade war", slop: 2, limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "trade war",
              "type": "phrase",
              "slop": 2,
              "fields": ["title", "description"]
            }
          },
          "size": 100
        }

  # --- Boolean / structured ---
  - id: bool-climate-not-politics
    description: "Boolean: climate articles excluding politics"
    engines:
      pg-seq:
        template: pg_fts_boolean
        params: { fields: "title || ' ' || coalesce(description,'') || ' ' || coalesce(content,'')", tsquery_expr: "climate & !politics", limit: 100 }
      pg-gin:
        template: pg_idx_boolean
        params: { tsquery_expr: "climate & !politics", limit: 100 }
      paradedb: |
        SELECT id FROM articles
        WHERE id @@@ paradedb.boolean(
          must => ARRAY[
            paradedb.boolean(should => ARRAY[
              paradedb.match('title', 'climate'),
              paradedb.match('description', 'climate'),
              paradedb.match('content', 'climate')
            ])
          ],
          must_not => ARRAY[
            paradedb.boolean(should => ARRAY[
              paradedb.match('title', 'politics'),
              paradedb.match('description', 'politics'),
              paradedb.match('content', 'politics')
            ])
          ]
        )
        ORDER BY pdb.score(id) DESC
        LIMIT 100
      elasticsearch: |
        {
          "query": {
            "bool": {
              "must": [
                { "multi_match": { "query": "climate", "fields": ["title", "description", "content"] } }
              ],
              "must_not": [
                { "multi_match": { "query": "politics", "fields": ["title", "description", "content"] } }
              ]
            }
          },
          "size": 100
        }

  - id: bool-complex
    description: "Boolean: (technology OR science) AND innovation"
    engines:
      pg-seq:
        template: pg_fts_boolean
        params: { fields: "title || ' ' || coalesce(description,'') || ' ' || coalesce(content,'')", tsquery_expr: "(technology | science) & innovation", limit: 100 }
      pg-gin:
        template: pg_idx_boolean
        params: { tsquery_expr: "(technology | science) & innovation", limit: 100 }
      paradedb: |
        SELECT id FROM articles
        WHERE id @@@ paradedb.boolean(
          must => ARRAY[
            paradedb.boolean(should => ARRAY[
              paradedb.match('title', 'technology'),
              paradedb.match('description', 'technology'),
              paradedb.match('content', 'technology'),
              paradedb.match('title', 'science'),
              paradedb.match('description', 'science'),
              paradedb.match('content', 'science')
            ]),
            paradedb.boolean(should => ARRAY[
              paradedb.match('title', 'innovation'),
              paradedb.match('description', 'innovation'),
              paradedb.match('content', 'innovation')
            ])
          ]
        )
        ORDER BY pdb.score(id) DESC
        LIMIT 100
      elasticsearch: |
        {
          "query": {
            "bool": {
              "must": [
                { "multi_match": { "query": "innovation", "fields": ["title", "description", "content"] } },
                {
                  "bool": {
                    "should": [
                      { "multi_match": { "query": "technology", "fields": ["title", "description", "content"] } },
                      { "multi_match": { "query": "science", "fields": ["title", "description", "content"] } }
                    ],
                    "minimum_should_match": 1
                  }
                }
              ]
            }
          },
          "size": 100
        }

  # --- Multi-field with boosting ---
  - id: mm-renewable-energy
    description: "Multi-field search for renewable energy with title boost"
    engines:
      pg-seq:
        template: pg_fts_weighted
        params: { terms: "renewable energy solar", limit: 100 }
      pg-gin:
        template: pg_idx_weighted
        params: { terms: "renewable energy solar", limit: 100 }
      paradedb:
        template: pdb_multi_field_boosted
        params: { terms: "renewable energy solar", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "renewable energy solar",
              "fields": ["title^3", "description^2", "content"]
            }
          },
          "size": 100
        }

  - id: mm-tech-innovation
    description: "Multi-field search for technology innovation"
    engines:
      pg-seq:
        template: pg_fts_weighted
        params: { terms: "technology innovation startup", limit: 100 }
      pg-gin:
        template: pg_idx_weighted
        params: { terms: "technology innovation startup", limit: 100 }
      paradedb:
        template: pdb_multi_field_boosted
        params: { terms: "technology innovation startup", limit: 100 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "technology innovation startup",
              "fields": ["title^3", "description^2", "content"]
            }
          },
          "size": 100
        }