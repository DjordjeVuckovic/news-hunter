schema_version: 1
id: news_fuzzy_v1
name: "News Fuzzy Search Benchmark v1"
description: "Typo-tolerant and approximate search queries for fuzzy paradigm evaluation"
version: "1.0.0"

corpus:
  name: news_hunter_articles
  source: "postgres://localhost:54320/news_db (articles)"

templates:
  # pg_trgm: trigram similarity — handles typos, transpositions, prefix variants.
  # Requires: CREATE EXTENSION pg_trgm; GIN index on (title gin_trgm_ops).
  - id: pg_trgm_title
    query: |
      SELECT id FROM articles
      WHERE similarity(title, '{{terms}}') > 0.2
      ORDER BY similarity(title, '{{terms}}') DESC
      LIMIT {{limit}}

  - id: pg_trgm_multi
    query: |
      SELECT id FROM articles
      WHERE similarity(title || ' ' || coalesce(description,''), '{{terms}}') > 0.15
      ORDER BY similarity(title || ' ' || coalesce(description,''), '{{terms}}') DESC
      LIMIT {{limit}}

  # pg_levenshtein: edit-distance search via levenshtein_less_equal.
  # Good for exact typo correction on single-token fields.
  - id: pg_levenshtein_title
    query: |
      SELECT id FROM articles
      WHERE EXISTS (
        SELECT 1 FROM unnest(string_to_array(lower(title), ' ')) AS w
        WHERE levenshtein_less_equal(w, lower('{{term}}'), {{max_dist}}) <= {{max_dist}}
      )
      ORDER BY ts_rank(
        to_tsvector('english', title || ' ' || coalesce(description,'')),
        plainto_tsquery('english', '{{terms}}')
      ) DESC
      LIMIT {{limit}}

  # ParadeDB: per-token Levenshtein fuzziness via paradedb.match(distance => n),
  # the direct analog to Elasticsearch fuzziness. distance is capped at 2.
  # Multi-field boolean(should) mirrors the ES multi_match title^3/description^2.
  # Requires: CREATE EXTENSION pg_search; BM25 index over (id, title, description).
  - id: pdb_fuzzy_multi
    query: |
      SELECT id FROM articles
      WHERE id @@@ paradedb.boolean(
        should => ARRAY[
          paradedb.boost(3.0, paradedb.match('title', '{{terms}}', distance => {{distance}})),
          paradedb.boost(2.0, paradedb.match('description', '{{terms}}', distance => {{distance}}))
        ]
      )
      ORDER BY pdb.score(id) DESC
      LIMIT {{limit}}

queries:
  # Queries intentionally contain misspellings to test fuzzy tolerance.

  - id: fuzzy-climat-chanje
    description: "Misspelled 'climate change' → tests trigram tolerance"
    engines:
      pg-trgm:
        template: pg_trgm_multi
        params: { terms: "climat chanje", limit: 50 }
      pg-levenshtein:
        template: pg_levenshtein_title
        params: { terms: "climate change", term: "climat", max_dist: 2, limit: 50 }
      paradedb:
        template: pdb_fuzzy_multi
        params: { terms: "climat chanje", distance: 2, limit: 50 }
      elasticsearch: |
        {
          "query": {
            "multi_match": {
              "query": "climat chanje",
              "fields": ["title^3", "description^2"],
              "fuzziness": "AUTO"
            }
          },
          "size": 50
        }

  - id: fuzzy-electon-results
