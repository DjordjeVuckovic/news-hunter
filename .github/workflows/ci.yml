name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Lint
        run: golangci-lint run ./...

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # -short skips the testcontainers-backed integration tests (storage/pg) so the
      # pipeline stays fast and Docker-independent. Run the full suite locally with
      # `go test ./...`, or add a dedicated integration job that drops -short.
      - name: Test
        run: go test -race -short ./...
