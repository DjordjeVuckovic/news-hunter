name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # golangci-lint-action manages its own cache; avoid setup-go cache conflicts.
          cache: false
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # -short skips the testcontainer-backed integration tests (storage/pg, storage/es)
      # because the container helpers (pkg/testing) honor testing.Short() and t.Skip(),
      # so no Docker daemon is required. Run the full suite locally with `go test ./...`,
      # or add a dedicated integration job that drops -short.
      - name: Test
        run: go test -race -short ./...
