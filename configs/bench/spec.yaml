  - name: "pg-gin-vs-paradedb-vs-es"
    suite: configs/bench/fts_quality_v1.yaml
    engines: [pg-gin, paradedb, elasticsearch]

  - name: "all-engines"
    suite: configs/bench/fts_quality_v1.yaml
    engines: [pg-seq, pg-gin, paradedb, elasticsearch]

